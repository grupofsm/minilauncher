<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniLauncher Hormican FSM</title>

  <style>
    :root {
      --brand: #005263;
      --brand-dark: #003f4c;
      --brand-soft: #e8f3f5;
      --success-bg: #dff3e6;
      --success-text: #145c2e;
      --warning-bg: #fff4d6;
      --warning-text: #7a5700;
      --error-bg: #fde2e2;
      --error-text: #842029;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: radial-gradient(circle at top, #ffffff 0%, #eef5f6 55%, #dcebed 100%);
      color: var(--brand-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.96);
      width: 100%;
      max-width: 560px;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 18px 45px rgba(0,82,99,0.22);
      text-align: center;
      border-top: 8px solid var(--brand);
    }

    .logo {
      max-width: 150px;
      width: 52%;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 25px;
      color: var(--brand);
    }

    .subtitle {
      margin: 0;
      color: #50666b;
      font-size: 15px;
    }

    .selectors {
      margin-top: 22px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      margin-bottom: 6px;
      color: var(--brand-dark);
    }

    select {
      width: 100%;
      border: 1px solid #c9d8dc;
      border-radius: 12px;
      padding: 12px;
      font-size: 15px;
      background: white;
      color: var(--brand-dark);
    }

    .status {
      margin: 24px 0 20px;
      padding: 16px;
      border-radius: 16px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 28px;
    }

    .checking {
      background: var(--warning-bg);
      color: var(--warning-text);
    }

    .online {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .offline {
      background: var(--error-bg);
      color: var(--error-text);
    }

    .launching {
      background: var(--brand-soft);
      color: var(--brand);
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(0,82,99,0.2);
      border-top: 3px solid var(--brand);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 22px;
    }

    button {
      border: none;
      border-radius: 17px;
      padding: 18px;
      font-size: 17px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    button span {
      font-size: 13px;
      font-weight: normal;
      opacity: 0.88;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.16);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .internal {
      background: var(--brand);
      color: white;
    }

    .external {
      background: #3c4a4d;
      color: white;
    }

    .recommended {
      outline: 4px solid #f2c94c;
      outline-offset: 4px;
    }

    .hint {
      margin-top: 22px;
      font-size: 14px;
      color: #61777c;
      line-height: 1.35;
    }

    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid #e3ecee;
      font-size: 12px;
      color: #829398;
    }

    @media (max-width: 480px) {
      .card {
        padding: 24px 18px;
      }

      .logo {
        max-width: 130px;
      }

      h1 {
        font-size: 22px;
      }

      .selectors {
        grid-template-columns: 1fr;
      }

      button {
        font-size: 16px;
        padding: 17px;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <img src="logo.png" alt="Hormican FSM Construcción" class="logo" />

    <h1>Acceso a Power Apps</h1>
    <p class="subtitle">Selecciona perfil, dispositivo y entorno de trabajo.</p>

    <div class="selectors">
      <div class="field">
        <label for="profileSelect">Perfil de acceso</label>
        <select id="profileSelect">
          <option value="standard">Estándar</option>
          <option value="premium">Premium</option>
        </select>
      </div>

      <div class="field">
        <label for="deviceSelect">Tipo de dispositivo</label>
        <select id="deviceSelect">
          <option value="desktop">Desktop</option>
          <option value="mobile">Smartphone</option>
        </select>
      </div>
    </div>

    <div id="statusBox" class="status checking">
      <span class="spinner"></span>
      <span>Comprobando red interna...</span>
    </div>

    <div class="buttons">
      <button id="btnInternal" class="internal" disabled>
        🏢 Acceso corporativo
        <span>Red interna / SQL Express / ApiHrsC</span>
      </button>

      <button id="btnExternal" class="external">
        🌐 Acceso público
        <span>Internet / SharePoint / Power Automate</span>
      </button>
    </div>

    <p id="hint" class="hint"></p>

    <div class="footer">
      MiniLauncher ApiHrsC · Hormican FSM
    </div>
  </main>

  <script src="config.js"></script>
  <script src="launcher.js"></script>
</body>
</html>
