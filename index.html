<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MiniLauncher Hormican FSM</title>

  <style>
    :root {
      --brand: #005263;
      --brand-dark: #003f4c;
      --brand-soft: #e8f3f5;
      --success-bg: #dff3e6;
      --success-text: #145c2e;
      --warning-bg: #fff4d6;
      --warning-text: #7a5700;
      --error-bg: #fde2e2;
      --error-text: #842029;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      color: var(--brand-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 74px 14px 14px;

      background:
        linear-gradient(
          rgba(255, 255, 255, 0.35),
          rgba(255, 255, 255, 0.45)
        ),
        url("https://grupofsm.com/assets/GrupoFSM_Grupo_03.jpg");

      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
    }

    body.fade-out {
      opacity: 0;
      transform: scale(0.98);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .top-banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 54px;
      background: rgba(0, 82, 99, 0.92);
      color: white;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      box-shadow: 0 4px 14px rgba(0,0,0,0.18);
      z-index: 10;
      backdrop-filter: blur(6px);
    }

    .top-banner-content {
      width: 100%;
      max-width: none;
      padding: 0 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: bold;
    }

  .top-banner img {
    height: 32px;
    width: auto;
    background: transparent;
    border-radius: 0;
    padding: 0;
    }    

    .card {
      background: rgba(255,255,255,0.92);
      width: 100%;
      max-width: 420px;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(0,82,99,0.22);
      text-align: center;
      border-top: 6px solid var(--brand);
      backdrop-filter: blur(6px);
    }

    .card.launch-clicked {
      transform: scale(0.97);
      opacity: 0.85;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .logo {
      max-width: 95px;
      width: 45%;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 19px;
      color: var(--brand);
    }

    .subtitle {
      margin: 0;
      color: #50666b;
      font-size: 12px;
    }

    .selectors {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: bold;
      margin-bottom: 5px;
      color: var(--brand-dark);
    }

    select {
      width: 100%;
      border: 1px solid #c9d8dc;
      border-radius: 10px;
      padding: 8px;
      font-size: 13px;
      background: white;
      color: var(--brand-dark);
    }

    .status {
      margin: 16px 0 10px;
      padding: 10px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 24px;
    }

    .checking {
      background: var(--warning-bg);
      color: var(--warning-text);
    }

    .online {
      background: var(--success-bg);
      color: var(--success-text);
    }

    .offline {
      background: var(--error-bg);
      color: var(--error-text);
    }

    .launching {
      background: var(--brand-soft);
      color: var(--brand);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0,82,99,0.2);
      border-top: 2px solid var(--brand);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      display: inline-block;
      flex: 0 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .target {
      margin: 10px 0 14px;
      padding: 10px;
      border-radius: 12px;
      background: #f4f8f9;
      border: 1px solid #d9e7ea;
      font-size: 12px;
      color: #40575c;
      line-height: 1.35;
    }

    .target strong {
      color: var(--brand);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
    }

    button span {
      font-size: 11px;
      font-weight: normal;
      opacity: 0.88;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.14);
    }

    button:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .primary {
      background: var(--brand);
      color: white;
      outline: 3px solid #f2c94c;
      outline-offset: 3px;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #61777c;
      line-height: 1.3;
    }

    .footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid #e3ecee;
      font-size: 10px;
      color: #829398;
    }

    @media (max-width: 480px) {
      body {
        padding: 64px 10px 10px;
      }

      .top-banner {
        height: 48px;
      }

      .top-banner-content {
        font-size: 12px;
      }

      .top-banner img {
        height: 28px;
      }

      .card {
        padding: 18px 14px;
        max-width: 360px;
      }

      .logo {
        max-width: 90px;
      }

      h1 {
        font-size: 18px;
      }

      .selectors {
        grid-template-columns: 1fr;
      }

      button {
        font-size: 14px;
        padding: 12px;
      }
    }
  </style>
</head>

<body>
  <header class="top-banner">
    <div class="top-banner-content">
      <img src="https://grupofsm.com/assets/ISO_GrupoFSM_Blanco.svg" alt="Grupo FSM" />
      <span>MiniLauncher · Acceso seguro a Power Apps</span>
    </div>
  </header>

  <main class="card">
    <img src="logo.png" alt="Hormican FSM Construcción" class="logo" />

    <h1>Acceso a Power Apps</h1>
    <p class="subtitle">Selecciona perfil y dispositivo.</p>

    <div class="selectors">
      <div class="field">
        <label for="profileSelect">Perfil de acceso</label>
        <select id="profileSelect">
          <option value="standard">Estándar</option>
          <option value="premium">Premium</option>
        </select>
      </div>

      <div class="field">
        <label for="deviceSelect">Tipo de dispositivo</label>
        <select id="deviceSelect">
          <option value="desktop">Desktop</option>
          <option value="mobile">Smartphone</option>
        </select>
      </div>
    </div>

    <div id="statusBox" class="status checking">
      <span class="spinner"></span>
      <span>Comprobando red interna...</span>
    </div>

    <div id="targetBox" class="target">
      Destino seleccionado: <strong>calculando...</strong>
    </div>

    <div class="buttons">
      <button id="btnLaunch" class="primary">
        Abrir aplicación recomendada
        <span id="btnLaunchSub">Preparando destino...</span>
      </button>
    </div>

    <p id="hint" class="hint"></p>

    <div class="footer">
      MiniLauncher ApiHrsC · Hormican FSM
    </div>
  </main>

  <script src="config.js"></script>
  <script src="launcher.js"></script>
</body>
</html>
